builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    ldflags:
      - -X github.com/pulumi/crd2pulumi/cmd.Version={{.Tag}}
    goarch:
      - amd64
      - arm64
    binary: crd2pulumi
    main: ./main.go
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: "{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  skip: true
